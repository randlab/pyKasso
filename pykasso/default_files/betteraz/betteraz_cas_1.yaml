 ##################
### SKS SETTINGS ###
 ##################

---
############
### Grid ###
############

x0 : 572510
y0 : 250010
z0 : 430
nx : 300
ny : 300
nz : 1
dx : 20
dy : 20
dz : 20

###############
### Polygon ###
###############

data_has_polygon : True
polygon_data     : 'inputs/polygon_Betteraz.txt'

####################
### PointManager ###
####################

###Inlets
# 'random'    - full random points
# 'import'    - import points
# 'composite' - add n random points to imported points
inlets_mode    : 'import'
inlets_data    : 'inputs/inlets_betteraz_cas_1.csv'
inlets_number  : 1
inlets_shuffle : ''

###Outlets
# 'random'    - full random points
# 'import'    - import points
# 'composite' - add n random points to imported points
outlets_mode    : 'import'
outlets_data    : 'inputs/outlets_betteraz.csv'
outlets_number  : 1
outlets_shuffle : ''

######################
### GeologyManager ###
######################

###Geology
# 'null'   - No geology
# 'import' - Import geology
geological_mode     : 'import'
geological_datafile : 'inputs/betteraz_2D_z430.gslib'

###Topography
# 'null'   - No topography
# 'csv'    - Import topography from csv file
topography_mode     : 'null'
topography_datafile : ''

###Orientation
# 'null'   - No orientation
# 'topo'   - Calculate orientation from topography
# 'import' - Import from gslib file
orientation_mode     : 'null'
orientation_datafile : ''

###Faults
# 'null'   - No faults
# 'import' - Import faults
# 'image'  - Import faults via image
faults_mode     : 'import'
faults_datafile : 'inputs/betteraz_fault_20_2D.gslib'

###Fractures
# 'null'   - No fractures
# 'import' - Import fractures
# 'image'  - Import fractures via image
# 'random' - Generate random fractures
fractures_mode     : 'random'
fractures_datafile : 'inputs/betteraz_fault_20_2D.gslib'

# If fractures mode is 'generate'
fractures_densities       : [0.000005,0.000005]
fractures_min_orientation : [    340,    70]
fractures_max_orientation : [     20,   110]
fractures_min_dip         : [     80,    40]
fractures_max_dip         : [     90,    50]

# For fracture size
fractures_alpha      : [2, 2]
fractures_min_length : [ 100,  100]
fractures_max_length : [4000, 4000]

###############################
### Fast-Marching Algorithm ###
###############################

# Choose which algorithm to use:
# 'skfmm'      - scikit fast-marching : 2D, fast, requires minimal inputs, but does not represent high-relief catchments well (original algorithm)
# 'Isotropic2' - agd-hfm : 2D, equivalent of skfmm
# 'Isotropic3' - adg-hfm : 3D, equivalent of skfmm
# 'Riemann2'   - agd-hfm : 2D, anisotropic, requires an anisotropy vector field (topography or geologic orientation), performs well in high-relief catchments
# 'Riemann3'   - agd-hfm : 3D version of anisotropic algorithm
# For more options, see agd-hfm library documentation

algorithm      : 'Isotropic2'

#Travel cost parallel to gradient
cost_out       : 0.999
cost_aquifer   : 0.2
cost_aquiclude : 0.6
cost_faults    : 0.05
cost_fractures : 0.05
cost_conduits  : 0.1
cost_ratio     : 0.25     #ratio of travel cost parallel to gradient / travel cost prependicular to gradient

### Formation to consider and FMM code associated
geology_id       : [1,2] # Only for 'import' geological mode
geology_velocity : [cost_aquifer, cost_aquiclude] # ??? REMOVE ??
geology_cost     : [cost_aquifer, cost_aquiclude] #add a parameter for travel cost through a cell

importance_factor : [1,2,3]

#############
### Other ###
#############

rand_seed : 0
verbosity : 0
...
